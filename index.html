<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes jeux HTML</title>

<style>
body {
    margin:0;
    background:#151515;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

h1 {
    margin-top:50px;
    font-size:50px;
}

.menu {
    margin-top:40px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

.card {
    width:250px;
    height:180px;
    background:#252525;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 15px #000;
}

.card h2 {
    margin-top:10px;
}

.card p {
    color:#bbb;
}

button {
    background:#00aaff;
    color:white;
    border:0;
    border-radius:10px;
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
}

button:hover {
    background:#0088cc;
    transform:scale(1.05);
}
</style>

</head>

<body>

<h1>🎮</h1>

<div class="menu">

    <div class="card">
        <h2>Jeu de survie</h2>
        <p>Explore un monde, construis et survis.</p>
        <button onclick="location.href='survie.html'">
            Jouer
        </button>
    </div>


    <div class="card">
        <h2>tower defence</h2>
        <p>Crée des machines avec des fils et pistons.</p>
        <button onclick="location.href='tdefence.html'">
            Jouer
        </button>
    </div>


    <div class="card">
        <h2>dlegacy</h2>
        <p>jeu de dungeon</p>
        <button onclick="location.href='dlegacy.html'">
            Jouer
        </button>
    </div>

</div>


</body>
</html>
